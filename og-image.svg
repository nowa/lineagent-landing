<?xml version="1.0" encoding="UTF-8"?>
<!--
  Open Graph / Twitter Card image (1200×630).
  Composition: dark page bg + brand-mint ASCII mark on the left,
  product wordmark + tagline + install one-liner on the right.
  Mirrors the hero of the live site so social previews feel like
  the same product.

  NOTE: Slack / Discord / Telegram render SVG og:image fine. X
  (Twitter) and LinkedIn prefer PNG/JPG; for those, generate a
  rasterized 1200×630 PNG from this file and reference that
  instead. Until then SVG is a no-cost upgrade vs no image at all.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
    <!-- Background: near-black with a subtle vertical gradient -->
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#15181D"/>
            <stop offset="100%" stop-color="#0F1115"/>
        </linearGradient>
    </defs>
    <rect width="1200" height="630" fill="url(#bg)"/>

    <!-- Brand mark: 5 rows × 11 cols of pixel cells, mirrored from
         crates/lineage/src/tui/theme.rs::LOGO_ROWS. Each cell is
         24×48 px (terminal cell aspect 1:2), so the full mark is
         264 wide × 240 tall. Positioned ~ left-center. -->
    <g fill="#00DF9A" transform="translate(120, 195)">
        <!-- row 0:   ███████   (cols 2..8) -->
        <rect x="48"  y="0" width="24" height="48"/>
        <rect x="72"  y="0" width="24" height="48"/>
        <rect x="96"  y="0" width="24" height="48"/>
        <rect x="120" y="0" width="24" height="48"/>
        <rect x="144" y="0" width="24" height="48"/>
        <rect x="168" y="0" width="24" height="48"/>
        <rect x="192" y="0" width="24" height="48"/>

        <!-- row 1:  ██ █ █ ██  (cols 1,2 4 6 8,9) -->
        <rect x="24"  y="48" width="24" height="48"/>
        <rect x="48"  y="48" width="24" height="48"/>
        <rect x="96"  y="48" width="24" height="48"/>
        <rect x="144" y="48" width="24" height="48"/>
        <rect x="192" y="48" width="24" height="48"/>
        <rect x="216" y="48" width="24" height="48"/>

        <!-- row 2: ███████████ (all 11 cols) -->
        <rect x="0"   y="96" width="24" height="48"/>
        <rect x="24"  y="96" width="24" height="48"/>
        <rect x="48"  y="96" width="24" height="48"/>
        <rect x="72"  y="96" width="24" height="48"/>
        <rect x="96"  y="96" width="24" height="48"/>
        <rect x="120" y="96" width="24" height="48"/>
        <rect x="144" y="96" width="24" height="48"/>
        <rect x="168" y="96" width="24" height="48"/>
        <rect x="192" y="96" width="24" height="48"/>
        <rect x="216" y="96" width="24" height="48"/>
        <rect x="240" y="96" width="24" height="48"/>

        <!-- row 3:   ███████   (same as row 0) -->
        <rect x="48"  y="144" width="24" height="48"/>
        <rect x="72"  y="144" width="24" height="48"/>
        <rect x="96"  y="144" width="24" height="48"/>
        <rect x="120" y="144" width="24" height="48"/>
        <rect x="144" y="144" width="24" height="48"/>
        <rect x="168" y="144" width="24" height="48"/>
        <rect x="192" y="144" width="24" height="48"/>

        <!-- row 4:   █  █  █   (cols 2, 5, 8) -->
        <rect x="48"  y="192" width="24" height="48"/>
        <rect x="120" y="192" width="24" height="48"/>
        <rect x="192" y="192" width="24" height="48"/>
    </g>

    <!-- Right-side wordmark + tagline. Monospace for the wordmark to
         match the CLI-native identity; sans-serif for tagline prose. -->
    <text x="500" y="240" fill="#FBFBFC"
          font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace"
          font-size="100" font-weight="700" letter-spacing="-2">lineage</text>

    <text x="500" y="290" fill="#5DEABF"
          font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
          font-size="22" font-weight="500">谱系系统 · lineage system · 系譜システム</text>

    <text x="500" y="365" fill="#FBFBFC"
          font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
          font-size="36" font-weight="700">Self-hosted multi-agent runtime</text>
    <text x="500" y="410" fill="#FBFBFC"
          font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
          font-size="36" font-weight="700">where Agents evolve.</text>

    <text x="500" y="475" fill="#8A9298"
          font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
          font-size="20" font-weight="400">Rust core · 9 LLM providers · local-first · files on your disk</text>

    <!-- Install one-liner pill -->
    <rect x="500" y="510" width="600" height="64" rx="8" fill="#0F1115" stroke="#1A1E24" stroke-width="1"/>
    <text x="520" y="552" fill="#FBFBFC"
          font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace"
          font-size="22" font-weight="500">$ curl -fsSL lineagent.ai/install.sh | sh</text>
</svg>
